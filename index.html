<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Series Nico</title>
<style>
:root{--bg:#0f172a;--card:#111827;--text:#f9fafb;--muted:#9ca3af;--line:#374151;--accent:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
header{padding:22px 16px;background:linear-gradient(135deg,#111827,#1e3a8a);position:sticky;top:0;z-index:10}
h1{margin:0;font-size:26px}.sub{margin:6px 0 0;color:#d1d5db}
main{max-width:1100px;margin:auto;padding:16px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}
.stat span{display:block;color:var(--muted);font-size:12px}.stat strong{font-size:24px}
.search{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:10px}
.filters{display:grid;gap:10px;margin-bottom:14px}
input,select,button{padding:12px;border-radius:12px;border:1px solid var(--line);font-size:15px}
input,select{background:#020617;color:var(--text)}
button{background:var(--accent);color:white;font-weight:700;border:0;cursor:pointer}
.grid{display:grid;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px}
.top{display:flex;justify-content:space-between;gap:8px}
.title{font-size:18px;font-weight:800}.num{color:var(--muted);font-size:12px;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tag{font-size:12px;background:#1e3a8a;color:#dbeafe;border-radius:999px;padding:5px 8px}
.tag.gray{background:#374151;color:#f3f4f6}
.detail{font-size:14px;color:#e5e7eb;margin-top:8px;line-height:1.35}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.score{background:#020617;border:1px solid var(--line);border-radius:12px;padding:8px;font-size:13px}
.empty{display:none;text-align:center;color:var(--muted);padding:28px}
@media(min-width:750px){.stats{grid-template-columns:repeat(4,1fr)}.filters{grid-template-columns:repeat(4,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.search{grid-template-columns:1fr}button{width:100%}}
</style>
</head>
<body>
<header>
<h1>🎬 Series Nico</h1>
<p class="sub">Catálogo personal con buscador, filtros, reseñas y puntuaciones.</p>
</header>
<main>
<section class="stats">
<div class="stat"><span>Series visibles</span><strong id="visible">0</strong></div>
<div class="stat"><span>Total catálogo</span><strong id="total">0</strong></div>
<div class="stat"><span>Países</span><strong id="paisesCount">0</strong></div>
<div class="stat"><span>Prom. crítica</span><strong id="avg">—</strong></div>
</section>
<section class="search">
<input id="q" placeholder="Buscar serie, actor, país, tipo o plataforma">
<button onclick="render()">🔍 Buscar</button>
</section>
<section class="filters">
<select id="pais" onchange="render()"><option value="">Todos los países</option></select>
<select id="plataforma" onchange="render()"><option value="">Todas las plataformas</option></select>
<select id="tipo" onchange="render()"><option value="">Todos los tipos</option></select>
<select id="genero" onchange="render()"><option value="">Todos los géneros</option></select>
</section>
<button onclick="clearFilters()">Limpiar filtros</button>
<div id="empty" class="empty">No encontré series con esos filtros.</div>
<section id="grid" class="grid"></section>
</main>
<script>
let DATA = [];
const $ = (id)=>document.getElementById(id);
function escapeHtml(s){return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function unique(key){return [...new Set(DATA.map(x=>x[key]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b)));}
function fill(id,key){const sel=$(id); unique(key).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});}
function n(v){const x=parseFloat(String(v||'').replace(',','.'));return Number.isNaN(x)?null:x;}
function render(){
  const term=$('q').value.trim().toLowerCase();
  const pais=$('pais').value, plataforma=$('plataforma').value, tipo=$('tipo').value, genero=$('genero').value;
  const rows=DATA.filter(s=>{
    const blob=Object.values(s).join(' ').toLowerCase();
    return (!term || blob.includes(term)) &&
           (!pais || s.pais===pais) &&
           (!plataforma || s.plataforma===plataforma) &&
           (!tipo || s.tipo===tipo) &&
           (!genero || s.genero===genero);
  });
  $('visible').textContent=rows.length;
  $('empty').style.display=rows.length?'none':'block';
  $('grid').innerHTML=rows.map(s=>`
    <article class="card">
      <div class="top"><div class="title">${escapeHtml(s.titulo)}</div><div class="num">#${escapeHtml(s.n)}</div></div>
      <div class="tags">
        ${s.plataforma?`<span class="tag">${escapeHtml(s.plataforma)}</span>`:''}
        ${s.pais?`<span class="tag gray">${escapeHtml(s.pais)}</span>`:''}
        ${s.tipo?`<span class="tag gray">${escapeHtml(s.tipo)}</span>`:''}
        ${s.genero?`<span class="tag gray">${escapeHtml(s.genero)}</span>`:''}
      </div>
      ${s.resena?`<div class="detail"><strong>Reseña:</strong> ${escapeHtml(s.resena)}</div>`:''}
      ${s.elenco?`<div class="detail"><strong>Elenco:</strong> ${escapeHtml(s.elenco)}</div>`:''}
      <div class="scores"><div class="score"><strong>Crítica:</strong> ${escapeHtml(s.critica||'—')}</div><div class="score"><strong>Nico:</strong> ${escapeHtml(s.nico||'—')}</div></div>
    </article>`).join('');
  window.scrollTo({top:0,behavior:'smooth'});
}
function clearFilters(){['q','pais','plataforma','tipo','genero'].forEach(id=>$(id).value='');render();}
async function init(){
  try{
    const res=await fetch('catalogo.json?ts=' + Date.now());
    DATA=await res.json();
  }catch(e){
    document.body.innerHTML='<main><h1>Error cargando catálogo</h1><p>No se pudo leer catalogo.json. Revisa que esté subido junto al index.html.</p></main>';
    return;
  }
  $('total').textContent=DATA.length;
  $('paisesCount').textContent=unique('pais').length;
  const nums=DATA.map(x=>n(x.critica)).filter(x=>x!==null);
  $('avg').textContent=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):'—';
  fill('pais','pais'); fill('plataforma','plataforma'); fill('tipo','tipo'); fill('genero','genero');
  render();
}
init();
</script>
</body>
</html>
